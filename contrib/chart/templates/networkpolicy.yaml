{{- if .Values.networkPolicy.enabled }}
{{- $ingressSourceNamespaces := default .Values.networkPolicy.ingressControllerNamespaces .Values.networkPolicy.ingressSourceNamespaces }}
{{- $repoCacheMode := include "centaur.repoCacheMode" . }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-default-deny
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-allow-dns
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if .Values.postgres.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "postgres") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
        - podSelector:
            matchLabels:
              centaur.ai/component: workflow-run
      ports:
        - protocol: TCP
          port: 5432
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "iron-proxy") | nindent 14 }}
        - podSelector:
            matchLabels:
              centaur.ai/managed: "true"
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
{{- range .Values.networkPolicy.apiIngressSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
{{- range .Values.runnerAccess.allowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
{{- if .Values.slackbot.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3001
{{- end }}
    - to:
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
              centaur.ai/sandbox-id: api
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
        - protocol: TCP
          port: {{ .Values.ironProxy.service.pgPortRangeStart }}
          endPort: {{ .Values.ironProxy.service.pgPortRangeEnd }}
    - ports:
        - protocol: TCP
          port: 443
---
{{- if .Values.slackbot.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "slackbot") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "slackbot") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
        - podSelector:
            matchLabels:
              centaur.ai/component: workflow-run
{{- range $ingressSourceNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
    - to:
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
              centaur.ai/sandbox-id: api
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
    # Slack bootstrap and message delivery need direct HTTPS egress.
    - ports:
        - protocol: TCP
          port: 443
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "iron-proxy-api") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "iron-proxy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/iron-proxy: "true"
      centaur.ai/sandbox-id: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
{{- if .Values.slackbot.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
{{- end }}
        - podSelector:
            matchLabels:
              centaur.ai/component: workflow-run
{{- range .Values.runnerAccess.allowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
    # Only the API process connects to the postgres listeners.
    - from:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.pgPortRangeStart }}
          endPort: {{ .Values.ironProxy.service.pgPortRangeEnd }}
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 5432
{{- if eq .Values.ironProxy.secretSource "onepassword-connect" }}
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "centaur.onepasswordConnectAppName" . | quote }}
      ports:
        - protocol: TCP
          port: {{ include "centaur.onepasswordConnectPort" . }}
{{- end }}
---
{{- if eq .Values.ironProxy.secretSource "onepassword-connect" }}
# Targets the 1Password Connect subchart's pods, which carry
# `app: <applicationName>` (default `onepassword-connect`).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-onepassword-connect
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "centaur.onepasswordConnectAppName" . | quote }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
{{- if .Values.tokenBroker.enabled }}
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "token-broker") | nindent 14 }}
{{- end }}
      ports:
        - protocol: TCP
          port: {{ include "centaur.onepasswordConnectPort" . }}
  egress:
    # connect-sync needs outbound HTTPS to my.1password.com.
    - ports:
        - protocol: TCP
          port: 443
---
{{- end }}
{{- if .Values.repoCache.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" "repo-cache") }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" "repo-cache") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "repo-cache") | nindent 6 }}
  policyTypes:
{{- if eq $repoCacheMode "gitMirror" }}
    - Ingress
{{- end }}
    - Egress
{{- if eq $repoCacheMode "gitMirror" }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              centaur.ai/managed: "true"
      ports:
        - protocol: TCP
          port: {{ .Values.repoCache.service.port }}
{{- end }}
  egress:
{{- if eq $repoCacheMode "gitMirror" }}
    - to:
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
              centaur.ai/sandbox-id: api
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
{{- else }}
{{- range .Values.repoCache.egressPorts }}
    - ports:
        - protocol: TCP
          port: {{ . }}
{{- end }}
{{- end }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-workflow-run
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/component: workflow-run
  policyTypes:
    - Egress
  egress:
{{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
{{- if .Values.slackbot.enabled }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "slackbot") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3001
{{- end }}
    - to:
        - podSelector:
            matchLabels:
              centaur.ai/iron-proxy: "true"
              centaur.ai/sandbox-id: api
      ports:
        - protocol: TCP
          port: {{ .Values.ironProxy.service.proxyPort }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
    # Trusted workflow code may make direct outbound calls (mirrors the API).
    - ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "centaur.fullname" . }}-sandbox
  labels:
{{ include "centaur.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      centaur.ai/managed: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "api") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
{{- if and .Values.repoCache.enabled (eq $repoCacheMode "gitMirror") }}
    - to:
        - podSelector:
            matchLabels:
{{ include "centaur.componentSelectorLabels" (dict "root" . "component" "repo-cache") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.repoCache.service.port }}
{{- end }}
{{- end }}
