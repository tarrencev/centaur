name: Publish Images

on:
  push:
    branches:
      - main
      - release/c7e-centaur-overlay*
    tags: [v*]
    paths:
      - .github/workflows/publish-images.yml
      - contrib/chart/**
      - services/**
      - centaur_sdk/**
      - packages/**
      - tools/**
      - scripts/bootstrap-k8s-secrets.sh
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .agents/skills/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: tarrencev/centaur
  IMAGE_SOURCE: https://github.com/tarrencev/centaur
  # Main/tags keep optimized release images. PRs and manual branch publishes
  # use debug builds so staging/dev iteration does not spend minutes optimizing
  # Rust binaries that are immediately replaced by the next test build.
  RUST_BUILD_PROFILE: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && 'debug' || 'release' }}

jobs:
  # Build each image natively per platform (amd64 on x64 runners, arm64 on
  # arm runners — no QEMU emulation), push by digest, and hand the digests
  # to the merge job below which assembles the multi-arch manifest.
  # arm64 is only built on pushes to main and release tags — PR and manual
  # dispatch builds stay amd64-only to keep iteration fast.
  #
  # c7e overlay: upstream builds on Depot (depot-* runners + paradigmxyz's Depot
  # project). This fork has no Depot project, so the build stays on GitHub-hosted
  # runners with docker buildx. Reconcile if upstream reworks the build again.
  build:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: [api-rs, slackbotv2, linearbot, discordbot, teamsbot, agent, iron-proxy, console]
        platform: ${{ github.event_name == 'push' && fromJSON('["linux/amd64", "linux/arm64"]') || fromJSON('["linux/amd64"]') }}
        include:
          - service: api-rs
            image: centaur-api-rs
            context: .
            dockerfile: services/api-rs/Dockerfile
            target: ""
          - service: slackbotv2
            image: centaur-slackbotv2
            context: .
            dockerfile: services/slackbotv2/Dockerfile
            target: ""
          - service: linearbot
            image: centaur-linearbot
            context: .
            dockerfile: services/linearbot/Dockerfile
            target: ""
          - service: discordbot
            image: centaur-discordbot
            context: .
            dockerfile: services/discordbot/Dockerfile
            target: ""
          - service: teamsbot
            image: centaur-teamsbot
            context: .
            dockerfile: services/teamsbot/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            context: .
            dockerfile: services/sandbox/Dockerfile
            target: sandbox
          - service: iron-proxy
            image: centaur-iron-proxy
            context: .
            dockerfile: services/iron-proxy/Dockerfile
            target: ""
          - service: console
            image: centaur-console
            context: services/console
            dockerfile: services/console/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Derive platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tags are applied by the merge job on the multi-arch manifest;
          # per-arch builds are pushed by digest only. Fork PRs run with a
          # read-only GITHUB_TOKEN, so they build without pushing.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=${{ !github.event.pull_request.head.repo.fork }}
          build-args: |
            RUST_BUILD_PROFILE=${{ env.RUST_BUILD_PROFILE }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }}
            type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          # Fork PRs run with a read-only GITHUB_TOKEN: exporting the registry
          # cache would fail the build, so only export it when we can push.
          cache-to: |
            ${{ !github.event.pull_request.head.repo.fork && format('type=registry,ref={0}/{1}/{2}:buildcache-{3},mode=max', env.REGISTRY, env.IMAGE_NAMESPACE, matrix.image, env.PLATFORM_SLUG) || '' }}
            type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}

      - name: Export digest
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !github.event.pull_request.head.repo.fork }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centaur-api-rs
          - image: centaur-slackbotv2
          - image: centaur-linearbot
          - image: centaur-agent
          - image: centaur-iron-proxy
          - image: centaur-console
          - image: centaur-discordbot
          - image: centaur-teamsbot

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.image }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=main-sha-,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=ref,event=pr
            type=sha
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Create multi-arch manifest for ${{ matrix.image }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

  # Auto-deploy: once the canonical release branch's base images are published,
  # tell the c7e overlay to roll them out (it gates on the `latitude`
  # environment). Manual pin-bump + dispatch still works as a fallback.
  notify-overlay:
    needs: merge
    if: github.event_name == 'push' && github.ref == 'refs/heads/release/c7e-centaur-overlay'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch overlay deploy with the new base image sha
        env:
          GH_TOKEN: ${{ secrets.OVERLAY_DISPATCH_TOKEN }}
        run: |
          short="${GITHUB_SHA:0:7}"
          gh api repos/cartridge-gg/agent/dispatches --method POST --input - <<EOF
          {
            "event_type": "base-images-published",
            "client_payload": { "sha": "${GITHUB_SHA}", "tag": "sha-${short}", "ref": "${GITHUB_REF_NAME}" }
          }
          EOF
